// ─── KPI Cards ────────────────────────────────────────────────────────────────
const KPICards = ({ theme, egresos }) => {
  const total = egresos.reduce((a, e) => a + e.total, 0);
  const sinIva = egresos.reduce((a, e) => a + e.subtotal, 0);
  const ivaTotal = egresos.reduce((a, e) => a + e.iva, 0);
  const proyectos = [...new Set(egresos.map(e => e.proyecto))].length;

  const cards = [
    { label: "Total con IVA", value: fmt(total), icon: "wallet", sub: `${egresos.length} egresos` },
    { label: "Subtotal sin IVA", value: fmt(sinIva), icon: "trending", sub: "Base gravable" },
    { label: "IVA Total", value: fmt(ivaTotal), icon: "budget", sub: "16%" },
    { label: "Proyectos", value: proyectos, icon: "building", sub: "activos" },
  ];

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
      {cards.map((c, i) => (
        <div key={i} style={{
          background: theme.kpiBg,
          border: `1px solid ${theme.kpiBorder}`,
          borderRadius: 10,
          padding: "14px 16px",
          display: "flex", alignItems: "center", gap: 12,
          transition: "transform 0.15s",

          onMouseEnter={e => e.currentTarget.style.transform = "translateY(-1px)"}
          onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}

            background: `${theme.kpiAccent}18`,
            display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,

            <div style={{ fontSize: 10, color: theme.tableHeadColor, marginTop: 1 }}>{c.sub}</div>

    "activeTab": "Ajustes"
  }/*EDITMODE-END*/);
  const setTweak = (k, v) => {
    const next = typeof k === "object" ? { ...tweaks, ...k } : { ...tweaks, [k]: v };
    setTweakState(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
  };

  const theme = THEMES[tweaks.theme] || THEMES.limpio;
  const [search, setSearch] = useState("");
  const [proyecto, setProyecto] = useState("TODOS");
  const [showFilters, setShowFilters] = useState(false);

  const filtered = useMemo(() => EGRESOS.filter(e => {
    const q = search.toLowerCase();
    const matchSearch = !q || e.proveedor.toLowerCase().includes(q)
      || e.descripcion.toLowerCase().includes(q)
      || e.categoria.toLowerCase().includes(q);
    const matchProy = proyecto === "TODOS" || e.proyecto === proyecto;
    return matchSearch && matchProy;
  }), [search, proyecto]);

                background: active ? "rgba(74,222,128,0.15)" : "transparent",

                fontWeight: active ? 600 : 500, fontSize: 13,

                borderLeft: active ? `3px solid ${theme.navActiveBorder}` : "3px solid transparent",
                transition: "all 0.15s",

                <Icon name={t.icon} size={15} color={active ? theme.kpiAccent : theme.navInactiveColor} />

              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: theme.logoPrimary }}>Administrador</div>
                <div style={{ fontSize: 10, color: theme.logoSub }}>Superadmin</div>
              </div>
            </div>
            <button style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: "transparent", border: "none", color: theme.logoSub, cursor: "pointer", fontSize: 12, width: "100%", borderRadius: 6 }}>
              <Icon name="logout" size={14} color={theme.logoSub} /> Salir
            </button>
          </div>
        </aside>

        {/* Main */}
        <main style={{ flex: 1, padding: "28px 32px", overflow: "auto" }}>
          <BuscarContent theme={theme} search={search} setSearch={setSearch}
            proyecto={proyecto} setProyecto={setProyecto} showFilters={showFilters}
            setShowFilters={setShowFilters} filtered={filtered} />
        </main>
        <TweaksOverlay tweaks={tweaks} setTweak={setTweak} theme={theme} />
      </div>
    );
  }

  // ── Top Nav Layout ──────────────────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", fontFamily: "'Plus Jakarta Sans', sans-serif", background: theme.appBg }}>
      {/* Header */}
      <header style={{
        background: theme.headerBg,
        borderBottom: theme.headerBorder,
        boxShadow: theme.headerShadow,
        padding: "0 28px",
        height: 56,
        display: "flex", alignItems: "center", gap: 16,
        position: "sticky", top: 0, zIndex: 100,
      }}>
        <Logo theme={theme} />
        <div style={{ width: 1, height: 28, background: isDark ? "rgba(255,255,255,0.1)" : "#e8eaed", marginLeft: 4 }} />
        {/* Project selector */}
        <select value={proyecto} onChange={e => setProyecto(e.target.value)} style={{
          background: theme.dropdown.bg,
          border: `1px solid ${theme.dropdown.border}`,
          color: theme.dropdown.color,
          borderRadius: 8,
          padding: "5px 10px",
          fontSize: 12,
          fontFamily: "'Plus Jakarta Sans', sans-serif",
          fontWeight: 500,
          cursor: "pointer",
          outline: "none",
        }}>
          {PROYECTOS.map(p => <option key={p} value={p}>{p === "TODOS" ? "Todos los proyectos" : p}</option>)}
        </select>
        <div style={{ flex: 1 }} />
        {/* Nav tabs in header */}
        <nav style={{ display: "flex", gap: 2 }}>
          {TABS.map(t => {
            const active = tweaks.activeTab === t.id;
            return (
              <button key={t.id} onClick={() => setTweak("activeTab", t.id)} style={{
                padding: "6px 14px", borderRadius: 8, border: "none", cursor: "pointer",
                background: active ? (isDark ? "rgba(56,189,248,0.15)" : "rgba(26,58,107,0.08)") : "transparent",
                color: active ? theme.navActiveColor : theme.navInactiveColor,
                fontWeight: active ? 600 : 500, fontSize: 13,
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                display: "flex", alignItems: "center", gap: 6,
                transition: "all 0.15s",
              }}>
                <Icon name={t.icon} size={14} color={active ? theme.kpiAccent : theme.navInactiveColor} />
                {t.id}
              </button>
            );
          })}
        </nav>
        <div style={{ width: 1, height: 28, background: isDark ? "rgba(255,255,255,0.1)" : "#e8eaed" }} />
        {/* User */}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            width: 30, height: 30, borderRadius: "50%",
            background: theme.kpiAccent,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: isDark ? "#0f172a" : "#fff" }}>AD</span>
          </div>
          <div style={{ lineHeight: 1.2 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: theme.logoPrimary }}>Administrador</div>
            <div style={{ fontSize: 10, color: theme.logoSub }}>Superadmin</div>
          </div>
          <button style={{ display: "flex", alignItems: "center", gap: 5, padding: "5px 10px", background: "transparent", border: `1px solid ${isDark ? "rgba(255,255,255,0.15)" : "#e2e4e9"}`, borderRadius: 7, color: theme.logoSub, cursor: "pointer", fontSize: 12, fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
            <Icon name="logout" size={12} color={theme.logoSub} /> Salir
          </button>
        </div>
      </header>

      {/* Content */}
      <div style={{ padding: "24px 28px" }}>
        <BuscarContent theme={theme} search={search} setSearch={setSearch}
          proyecto={proyecto} setProyecto={setProyecto} showFilters={showFilters}
          setShowFilters={setShowFilters} filtered={filtered} />
      </div>
      <TweaksOverlay tweaks={tweaks} setTweak={setTweak} theme={theme} />
    </div>
  );
}

// ─── Buscar Content ───────────────────────────────────────────────────────────
function BuscarContent({ theme, search, setSearch, proyecto, setProyecto, showFilters, setShowFilters, filtered }) {
  const totalFiltrado = filtered.reduce((a, e) => a + e.total, 0);
  return (
    <div>
      <KPICards theme={theme} egresos={filtered} />
      <div style={{
        background: theme.contentBg,
        border: theme.contentBorder,
        borderRadius: theme.contentRadius,
        boxShadow: theme.contentShadow,
        overflow: "hidden",
      }}>
        {/* Toolbar */}
        <div style={{
          padding: "16px 20px",
          display: "flex", alignItems: "center", gap: 10,
          borderBottom: `1px solid ${theme.tableRowBorder}`,
        }}>
          {/* Search */}
          <div style={{ position: "relative", flex: 1, maxWidth: 420 }}>
            <div style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)" }}>
              <Icon name="search" size={15} color={theme.tableHeadColor} />
            </div>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Buscar por proveedor, descripción o categoría…"
              style={{
                width: "100%",
                background: theme.searchBg,
                border: theme.searchBorder,
                borderRadius: 8,
                padding: "8px 12px 8px 36px",
                fontSize: 13,
                color: theme.tableCellColor,
                outline: "none",
                fontFamily: "'Plus Jakarta Sans', sans-serif",
              }}
            />
          </div>

          {/* Filters toggle */}
          <button onClick={() => setShowFilters(!showFilters)} style={{
            display: "flex", alignItems: "center", gap: 6,
            padding: "8px 14px", borderRadius: 8,
            background: showFilters ? `${theme.kpiAccent}20` : theme.btnSecondary.bg,
            border: `1px solid ${showFilters ? theme.kpiAccent : theme.btnSecondary.border}`,
            color: showFilters ? theme.kpiAccent : theme.btnSecondary.color,
            cursor: "pointer", fontSize: 13, fontWeight: 500,
            fontFamily: "'Plus Jakarta Sans', sans-serif",
            transition: "all 0.15s",
          }}>
            <Icon name="filter" size={13} color={showFilters ? theme.kpiAccent : theme.btnSecondary.color} />
            Filtros
          </button>

          <div style={{ flex: 1 }} />

          {/* Results count */}
          <span style={{ fontSize: 12, color: theme.tableHeadColor }}>
            <strong style={{ color: theme.tableCellColor }}>{filtered.length}</strong> resultado{filtered.length !== 1 ? "s" : ""}
            &nbsp;·&nbsp;
            <strong style={{ color: theme.totalColor }}>{fmt(totalFiltrado)}</strong>
          </span>

          {/* Export */}
          <button style={{
            display: "flex", alignItems: "center", gap: 6,
            padding: "8px 16px", borderRadius: 8,
            background: theme.btnPrimary.bg,
            border: "none",
            color: theme.btnPrimary.color,
            cursor: "pointer", fontSize: 13, fontWeight: 600,
            fontFamily: "'Plus Jakarta Sans', sans-serif",
          }}
            onMouseEnter={e => e.currentTarget.style.background = theme.btnPrimary.hoverBg}
            onMouseLeave={e => e.currentTarget.style.background = theme.btnPrimary.bg}
          >
            <Icon name="download" size={13} color={theme.btnPrimary.color} />
            Exportar PDF
          </button>
        </div>

        {/* Filters row */}
        {showFilters && (
          <div style={{
            padding: "12px 20px",
            borderBottom: `1px solid ${theme.tableRowBorder}`,
            display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center",
            background: theme.searchBg,
          }}>
            <span style={{ fontSize: 12, color: theme.tableHeadColor, fontWeight: 500 }}>Proyecto:</span>
            {["TODOS", "COSTAVENTURA", "MDI TORRE", "PARQUE NORTE"].map(p => (
              <button key={p} onClick={() => setProyecto(p)} style={{
                padding: "4px 12px", borderRadius: 20,
                border: `1px solid ${proyecto === p ? theme.kpiAccent : theme.btnSecondary.border}`,
                background: proyecto === p ? `${theme.kpiAccent}18` : theme.btnSecondary.bg,
                color: proyecto === p ? theme.kpiAccent : theme.btnSecondary.color,
                fontSize: 12, fontWeight: 500, cursor: "pointer",
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                transition: "all 0.15s",
              }}>
                {p === "TODOS" ? "Todos" : p}
              </button>
            ))}
          </div>
        )}

        <EgresosTable theme={theme} egresos={filtered} />
      </div>
    </div>
  );
}

// ─── Tweaks Overlay ───────────────────────────────────────────────────────────
function TweaksOverlay({ tweaks, setTweak, theme }) {
  const [visible, setVisible] = useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setVisible(true);
      if (e.data?.type === "__deactivate_edit_mode") setVisible(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  if (!visible) return null;

  return (
    <TweaksPanel onClose={() => {
      setVisible(false);
      window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*");
    }}>
      <TweakSection label="Estilo visual">
        <TweakRadio id="theme" label="Tema" value={tweaks.theme}
          options={[
            { label: "Limpio", value: "limpio" },
            { label: "Oscuro", value: "moderno" },
            { label: "Sidebar", value: "sidebar" },
          ]}
          onChange={v => setTweak("theme", v)} />
      </TweakSection>
      <TweakSection label="Navegación">
        <TweakSelect id="tab" label="Pantalla activa" value={tweaks.activeTab}
          options={["Dashboard", "Buscar", "Presupuestos", "Ajustes"].map(t => ({ label: t, value: t }))}
          onChange={v => setTweak("activeTab", v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
